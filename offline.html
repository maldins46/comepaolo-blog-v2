<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Comepaolo</title>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var theme = (stored === 'light' || stored === 'dark') ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="light"] {
      --bg: #FAFAF9;
      --text-primary: #1A1918;
      --text-secondary: #6B6966;
      --accent: #2563EB;
      --border: #E5E4E1;
    }
    [data-theme="dark"] {
      --bg: #111110;
      --text-primary: #EDECEA;
      --text-secondary: #9C9891;
      --accent: #60A5FA;
      --border: #2A2928;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      line-height: 1;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    p {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 360px;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>This page isn't available offline. Check your connection and <a href="javascript:window.location.reload()">try again</a>, or <a href="/">go home</a>.</p>
</body>
</html>
