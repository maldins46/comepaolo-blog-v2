<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #FAFAF9; }
    .text { fill: #1A1918; }
    .accent { fill: #2563EB; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #111110; }
      .text { fill: #EDECEA; }
      .accent { fill: #60A5FA; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" ry="6"/>
  <text
    font-family="'JetBrains Mono', monospace"
    font-size="13"
    font-weight="700"
    letter-spacing="-0.5"
    text-anchor="middle"
    dominant-baseline="central"
    x="16" y="16"
  >
    <tspan class="text">cp</tspan><tspan class="accent">_</tspan>
  </text>
</svg>
